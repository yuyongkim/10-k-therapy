name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Next.js — lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next-finance-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: next-finance-dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # sync:data prebuild step needs the license_summary.json present.
          # In CI we skip the sync and provide an empty summary so the build still passes.
          SKIP_SYNC: "1"

  backend:
    name: Python — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        run: pytest -q tests/ --no-header --maxfail=5
        env:
          # Keep CI hermetic — no real API keys needed for unit tests.
          GEMINI_API_KEY: ""
          DART_API_KEY: ""
          COURTLISTENER_API_KEY: ""
          ANTHROPIC_API_KEY: ""
